<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Portal Dashboard - St. Michael Kasaini Youth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="bg-light">
    <script>
        const currentUserName = localStorage.getItem('youthName');
        if (!currentUserName) window.location.href = '/login';
    </script>

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">St. Michael Kasaini Member Portal</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Sign Out</button>
    </nav>

    <div class="container py-4">
        <div class="alert alert-success d-flex justify-content-between align-items-center mb-4">
            <span>Welcome to your Member Portal, <strong id="welcomeName"></strong>!</span>
            <span id="announcementBanner" class="badge bg-warning text-dark px-3 py-2">Loading updates...</span>
        </div>

        <!-- Upcoming & Past Events Section -->
        <div class="card shadow-sm p-4 mb-4">
            <h3 class="text-primary mb-3">📅 Upcoming & Past Station Events</h3>
            <div class="row" id="eventsContainer">
                <div class="text-muted">Loading events...</div>
            </div>
        </div>

        <!-- Registered Members Directory -->
        <div class="card shadow-sm p-4 mb-4">
            <h3 class="text-primary mb-3">👥 Registered Youth Members Directory</h3>
            <div class="table-responsive">
                <table class="table table-bordered table-striped" id="membersDirectoryTable">
                    <thead>
                        <tr><th>No</th><th>ID</th><th>Name</th><th>Jumuiya</th><th>Group</th></tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="text-muted">Loading directory...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Chat / Message Admin Section -->
        <div class="card shadow-sm p-4">
            <h3 class="text-primary mb-3">💬 Message & Chat with Admin</h3>
            <div id="chatBox" class="border rounded p-3 mb-3 bg-white" style="height: 250px; overflow-y: auto;">
                <div class="text-muted small">Loading messages...</div>
            </div>
            <form id="chatForm">
                <div class="input-group">
                    <input type="text" id="chatInput" class="form-control" placeholder="Type your message to the officials..." required>
                    <button class="btn btn-primary" type="submit">Send Message</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('welcomeName').textContent = currentUserName;

        async function loadDashboardData() {
            try {
                const res = await fetch('/api/youth/directory');
                const data = await res.json();
                if(data.success) {
                    // Announcements
                    if(data.readings && data.readings.announcement) {
                        document.getElementById('announcementBanner').textContent = data.readings.announcement;
                    }

                    // Events
                    let eHtml = '';
                    if (!data.events || data.events.length === 0) {
                        eHtml = '<div class="text-muted">No events currently scheduled.</div>';
                    } else {
                        data.events.forEach(ev => {
                            const badgeClass = ev.type === 'upcoming' ? 'bg-success' : 'bg-secondary';
                            eHtml += `
                                <div class="col-md-6 mb-3">
                                    <div class="p-3 border rounded bg-white shadow-sm h-100">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <h5 class="mb-0 text-dark">${ev.title}</h5>
                                            <span class="badge ${badgeClass} text-uppercase small">${ev.type}</span>
                                        </div>
                                        <p class="text-muted small mb-1">📅 Date: ${ev.date}</p>
                                        <p class="mb-0 small">${ev.description || ''}</p>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    document.getElementById('eventsContainer').innerHTML = eHtml;

                    // Members Directory
                    let mHtml = '';
                    if (!data.members || data.members.length === 0) {
                        mHtml = '<tr><td colspan="5" class="text-muted">No approved members found yet.</td></tr>';
                    } else {
                        data.members.forEach((m, idx) => {
                            mHtml += `<tr><td>${idx + 1}</td><td><strong class="text-primary">${m.customId || 'N/A'}</strong></td><td>${m.name}</td><td>${m.jumuiya || '-'}</td><td>${m.group}</td></tr>`;
                        });
                    }
                    document.getElementById('membersDirectoryTable').querySelector('tbody').innerHTML = mHtml;

                    // Messages / Chat
                    let msgHtml = '';
                    if (!data.messages || data.messages.length === 0) {
                        msgHtml = '<div class="text-muted small">No messages yet. Send a note to the admin below.</div>';
                    } else {
                        data.messages.forEach(msg => {
                            const isMe = msg.sender === currentUserName;
                            const alignClass = isMe ? 'text-end text-primary' : 'text-start text-dark';
                            msgHtml += `
                                <div class="mb-2 ${alignClass}">
                                    <div class="small fw-bold">${msg.sender} <span class="text-muted fw-normal" style="font-size: 10px;">(${msg.time})</span></div>
                                    <div class="d-inline-block p-2 rounded bg-light border text-start small text-dark" style="max-width: 80%;">${msg.text}</div>
                                </div>
                            `;
                        });
                    }
                    const chatBox = document.getElementById('chatBox');
                    chatBox.innerHTML = msgHtml;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch(e) {}
        }

        loadDashboardData();
        setInterval(loadDashboardData, 5000); // Poll every 5s for chat updates

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('chatInput').value.trim();
            if(!text) return;
            await fetch('/api/youth/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sender: currentUserName, text })
            });
            document.getElementById('chatInput').value = '';
            loadDashboardData();
        });

        async function logout() {
            await fetch('/api/youth/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: currentUserName })
            });
            localStorage.removeItem('youthName');
            window.location.href = '/login';
        }
    </script></body></html>
