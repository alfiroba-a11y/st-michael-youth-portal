<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - St. Michael Kasaini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --church-navy: #1b365d; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="/" class="text-decoration-none fw-bold text-dark fs-5"><i class="fa-solid fa-cross text-warning me-2"></i>St. Michael Kasaini</a>
            <h4 class="fw-bold text-primary mt-2">Create Account (Sign Up)</h4>
            <p class="text-muted small">Register for the youth member portal</p>
        </div>

        <div id="regAlert" class="alert d-none small p-2" role="alert"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label fw-bold small">First Name</label>
                <input type="text" class="form-control" id="regName" required placeholder="First name only">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">Phone Number</label>
                <input type="text" class="form-control" id="regPhone" required placeholder="07xxxxxxxx">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">Password</label>
                <input type="password" class="form-control" id="regPassword" required placeholder="Create a password">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">Youth Group</label>
                <select class="form-select" id="regGroup">
                    <option value="General">General</option>
                    <option value="YCA">YCA</option>
                    <option value="YSC">YSC</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2 text-dark">Sign Up</button>
        </form>

        <div class="text-center mt-3">
            <span class="small text-muted">Already have an account? <a href="/login" class="fw-bold text-primary text-decoration-none">Sign in</a></span>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('regAlert');
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const group = document.getElementById('regGroup').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, password, group })
                });
                const data = await res.json();

                alertBox.textContent = data.message;
                alertBox.className = data.success ? 'alert alert-success small p-2' : 'alert alert-danger small p-2';
                alertBox.classList.remove('d-none');

                if (data.success) {
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                }
            } catch (err) {
                alertBox.textContent = 'Connection error. Please try again.';
                alertBox.className = 'alert alert-danger small p-2';
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
