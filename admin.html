<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officials Portal - St. Michael Kasaini Youth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="loginSection" class="container py-5" style="max-width: 400px;">
        <div class="card shadow-sm p-4">
            <h3 class="mb-3 text-danger">Officials Login</h3>
            <div id="adminAlert" class="alert d-none" role="alert"></div>
            <form id="adminLoginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="adminUser" class="form-control" required value="admin">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="adminPass" class="form-control" required value="admin123">
                </div>
                <button type="submit" class="btn btn-danger w-100">Login to Officials Portal</button>
            </form>
            <div class="mt-3 text-center"><a href="/" class="text-decoration-none small">Back to Home</a></div>
        </div>
    </div>

    <div id="dashboardSection" class="container py-4 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Officials Control Panel</h2>
            <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">Logout</button>
        </div>

        <!-- Upload Readings & Dashboard Updates -->
        <div class="card shadow-sm p-4 mb-4">
            <h4 class="text-primary mb-3">Upload Readings & Dashboard Updates</h4>
            <div id="readingAlert" class="alert d-none"></div>
            <form id="readingForm">
                <div class="mb-3">
                    <label class="form-label">Readings Title</label>
                    <input type="text" id="readTitle" class="form-control">
                </div>
                <div class="row">
                    <div class="mb-3 col-md-6">
                        <label class="form-label">First Reading</label>
                        <textarea id="readFirst" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3 col-md-6">
                        <label class="form-label">Responsorial Psalm</label>
                        <textarea id="readPsalm" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="mb-3 col-md-6">
                        <label class="form-label">Second Reading</label>
                        <textarea id="readSecond" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3 col-md-6">
                        <label class="form-label">Gospel</label>
                        <textarea id="readGospel" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Dashboard Announcement Banner</label>
                    <input type="text" id="readAnnouncement" class="form-control" placeholder="e.g. Next practice on Saturday at 4 PM">
                </div>
                <button type="submit" class="btn btn-primary">Save & Push to User Dashboard</button>
            </form>
        </div>

        <!-- Pending Registrations -->
        <div class="card shadow-sm p-4 mb-4">
            <h4>Pending Registrations (Approve generates K1, K2...)</h4>
            <div id="pendingList" class="table-responsive">Loading...</div>
        </div>

        <!-- Spreadsheet Style Approved Members List -->
        <div class="card shadow-sm p-4 mb-4">
            <h4>Registered Youth Directory</h4>
            <div id="memberList" class="table-responsive">Loading...</div>
        </div>

        <!-- Active Sessions / Revoke Access -->
        <div class="card shadow-sm p-4">
            <h4>Active User Sessions & Access Control</h4>
            <div id="sessionList" class="table-responsive">Loading...</div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            const alertBox = document.getElementById('adminAlert');

            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('loginSection').classList.add('d-none');
                document.getElementById('dashboardSection').classList.remove('d-none');
                loadAdminData();
            } else {
                alertBox.textContent = 'Invalid credentials';
                alertBox.className = 'alert alert-danger small';
                alertBox.classList.remove('d-none');
            }
        });

        async function loadAdminData() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            if (data.success) {
                if (data.readings) {
                    document.getElementById('readTitle').value = data.readings.title || '';
                    document.getElementById('readFirst').value = data.readings.first || '';
                    document.getElementById('readPsalm').value = data.readings.psalm || '';
                    document.getElementById('readSecond').value = data.readings.second || '';
                    document.getElementById('readGospel').value = data.readings.gospel || '';
                    document.getElementById('readAnnouncement').value = data.readings.announcement || '';
                }

                // Pending Table
                let pHtml = '<table class="table table-bordered"><thead><tr><th>Name</th><th>Phone</th><th>Jumuiya</th><th>Group</th><th>Action</th></tr></thead><tbody>';
                if (data.pending.length === 0) pHtml += '<tr><td colspan="5" class="text-muted">No pending registrations.</td></tr>';
                data.pending.forEach(p => {
                    pHtml += `<tr><td>${p.name}</td><td>${p.phone}</td><td>${p.jumuiya}</td><td>${p.group}</td><td><button class="btn btn-success btn-sm" onclick="approveUser('${p.id}')">Approve</button> <button class="btn btn-outline-danger btn-sm" onclick="rejectUser('${p.id}')">Reject</button></td></tr>`;
                });
                pHtml += '</tbody></table>';
                document.getElementById('pendingList').innerHTML = pHtml;

                // Spreadsheet Style Members Table: No, ID, Name, Number, Group
                let mHtml = '<table class="table table-bordered table-striped"><thead><tr><th>No</th><th>ID</th><th>Name</th><th>Number</th><th>Group</th><th>Action</th></tr></thead><tbody>';
                if (data.members.length === 0) mHtml += '<tr><td colspan="6" class="text-muted">No registered members yet.</td></tr>';
                data.members.forEach((m, index) => {
                    mHtml += `<tr><td>${index + 1}</td><td><strong>${m.customId || 'K' + (index+1)}</strong></td><td>${m.name}</td><td>${m.phone}</td><td>${m.group}</td><td><button class="btn btn-danger btn-sm" onclick="removeMember('${m.id}')">Remove</button></td></tr>`;
                });
                mHtml += '</tbody></table>';
                document.getElementById('memberList').innerHTML = mHtml;

                // Active Sessions (Revoke Access)
                let sHtml = '<table class="table table-bordered"><thead><tr><th>Member Name</th><th>Login Time</th><th>Action</th></tr></thead><tbody>';
                const sessions = data.activeSessions || {};
                const keys = Object.keys(sessions);
                if (keys.length === 0) sHtml += '<tr><td colspan="3" class="text-muted">No active user sessions.</td></tr>';
                keys.forEach(name => {
                    sHtml += `<tr><td>${name}</td><td>${sessions[name].loginTime}</td><td><button class="btn btn-warning btn-sm" onclick="revokeSession('${name}')">Revoke Portal Access</button></td></tr>`;
                });
                sHtml += '</tbody></table>';
                document.getElementById('sessionList').innerHTML = sHtml;
            }
        }

        document.getElementById('readingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('readTitle').value,
                first: document.getElementById('readFirst').value,
                psalm: document.getElementById('readPsalm').value,
                second: document.getElementById('readSecond').value,
                gospel: document.getElementById('readGospel').value,
                announcement: document.getElementById('readAnnouncement').value
            };
            const res = await fetch('/api/admin/update-readings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            const alertBox = document.getElementById('readingAlert');
            if(data.success) {
                alertBox.textContent = 'Readings and updates pushed successfully to user dashboard!';
                alertBox.className = 'alert alert-success small';
                alertBox.classList.remove('d-none');
            }
        });

        async function approveUser(id) {
            await fetch('/api/admin/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            loadAdminData();
        }

        async function rejectUser(id) {
            await fetch('/api/admin/reject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            loadAdminData();
        }

        async function removeMember(id) {
            await fetch('/api/admin/remove-member', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            loadAdminData();
        }

        async function revokeSession(name) {
            await fetch('/api/admin/revoke-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            loadAdminData();
        }
    </script>
</body>
</html>
