<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Access - St. Michael Kasaini Youth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="/">✝ St. Michael Kasaini Youth</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        </div>
    </nav>

    <div class="container my-auto py-5" style="max-width: 450px;">
        <div class="card shadow-sm p-4">
            <ul class="nav nav-pills nav-fill mb-3" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="signin-tab" data-bs-toggle="pill" data-bs-target="#signin" type="button" role="tab">Sign In</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signup" type="button" role="tab">Sign Up</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">
                <!-- Sign In Form -->
                <div class="tab-pane fade show active" id="signin" role="tabpanel">
                    <h4 class="mb-3 text-primary">Member Sign In</h4>
                    <div id="signinAlert" class="alert d-none" role="alert"></div>
                    <form id="signinForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="loginName" class="form-control" required placeholder="Enter your full name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPass" class="form-control" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In to Dashboard</button>
                    </form>
                </div>

                <!-- Sign Up Form -->
                <div class="tab-pane fade" id="signup" role="tabpanel">
                    <h4 class="mb-3 text-success">Create Youth Account</h4>
                    <div id="signupAlert" class="alert d-none" role="alert"></div>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="regName" class="form-control" required placeholder="Your full name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="regPhone" class="form-control" placeholder="e.g. 0712345678">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Jumuiya / Community</label>
                            <input type="text" id="regJumuiya" class="form-control" placeholder="e.g. St. Kizito">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Youth Group / Choir</label>
                            <input type="text" id="regGroup" class="form-control" placeholder="e.g. Youth Choir / General">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Create Password</label>
                            <input type="password" id="regPass" class="form-control" required placeholder="Secure password">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Submit Registration</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Copyright and Management Footer -->
    <footer class="text-center py-3 mt-auto text-muted small border-top bg-white">
        &copy; 2026 St. Michael Kasaini Youth Portal. Created and managed by Robert Wambua. All rights reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sign In Handler
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value;
            const alertBox = document.getElementById('signinAlert');

            alertBox.className = 'alert alert-info small';
            alertBox.textContent = 'Verifying credentials...';
            alertBox.classList.remove('d-none');

            try {
                const res = await fetch('/api/youth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, pass })
                });
                const data = await res.json();

                if (data.success) {
                    alertBox.className = 'alert alert-success small';
                    alertBox.textContent = 'Login successful! Redirecting...';
                    localStorage.setItem('youth_user', data.name);
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                } else {
                    alertBox.className = 'alert alert-danger small';
                    alertBox.textContent = data.message || 'Login failed.';
                }
            } catch (err) {
                alertBox.className = 'alert alert-danger small';
                alertBox.textContent = 'Connection error. Please try again.';
            }
        });

        // Sign Up Handler
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const jumuiya = document.getElementById('regJumuiya').value.trim();
            const group = document.getElementById('regGroup').value.trim();
            const pass = document.getElementById('regPass').value;
            const alertBox = document.getElementById('signupAlert');

            try {
                const res = await fetch('/api/youth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, jumuiya, group, pass })
                });
                const data = await res.json();

                alertBox.textContent = data.message;
                alertBox.className = data.success ? 'alert alert-success small' : 'alert alert-danger small';
                alertBox.classList.remove('d-none');

                if (data.success) {
                    document.getElementById('signupForm').reset();
                }
            } catch (err) {
                alertBox.textContent = 'Registration error. Please check connection.';
                alertBox.className = 'alert alert-danger small';
                alertBox.classList.remove('d-none');
            }
        });
    </script></body></html>
