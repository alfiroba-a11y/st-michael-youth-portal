<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In & Registration - St. Michael Kasaini Youth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="/">✝ St. Michael Kasaini Youth</a>
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm p-4">
                    <h3 class="mb-3 text-primary">Member Sign In</h3>
                    <div id="loginAlert" class="alert d-none" role="alert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="loginName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPass" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In to Dashboard</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm p-4">
                    <h3 class="mb-3 text-success">Create Account (Sign Up)</h3>
                    <p class="text-muted small">Requires approval and KES 100 fee with Treasurer Samuel Mutunga.</p>
                    <div id="registerAlert" class="alert d-none" role="alert"></div>
                    <form id="registerForm">
                        <div class="row">
                            <div class="mb-3 col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="regName" required>
                            </div>
                            <div class="mb-3 col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" id="regPhone" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="mb-3 col-md-6">
                                <label class="form-label">Jumuiya</label>
                                <input type="text" class="form-control" id="regJumuiya" required>
                            </div>
                            <div class="mb-3 col-md-6">
                                <label class="form-label">Group</label>
                                <select class="form-select" id="regGroup">
                                    <option value="Youth General">Youth General</option>
                                    <option value="Choir">Choir</option>
                                    <option value="Liturgy">Liturgy</option>
                                    <option value="Projects">Projects</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPass" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Submit Registration (KES 100 Paid)</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value;
            const alertBox = document.getElementById('loginAlert');
            alertBox.classList.add('d-none');

            try {
                const res = await fetch('/api/youth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, pass })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('youthName', data.name);
                    window.location.href = '/dashboard';
                } else {
                    alertBox.textContent = data.message;
                    alertBox.className = 'alert alert-danger small';
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.textContent = 'Connection error.';
                alertBox.className = 'alert alert-danger small';
                alertBox.classList.remove('d-none');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('registerAlert');
            const payload = {
                name: document.getElementById('regName').value.trim(),
                phone: document.getElementById('regPhone').value.trim(),
                jumuiya: document.getElementById('regJumuiya').value.trim(),
                group: document.getElementById('regGroup').value,
                pass: document.getElementById('regPass').value
            };
            try {
                const res = await fetch('/api/youth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                alertBox.textContent = data.message;
                alertBox.className = data.success ? 'alert alert-success small' : 'alert alert-danger small';
                alertBox.classList.remove('d-none');
                if (data.success) e.target.reset();
            } catch (err) {
                alertBox.textContent = 'Registration failed.';
                alertBox.className = 'alert alert-danger small';
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
